<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>肩袖术后随访系统</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--s2:#666;--acc:#1a73e8;--ok:#0d8a3e;--warn:#e67e22;--red:#c0392b;--border:#dde;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:650px;margin:0 auto;padding:10px}
.hdr{background:linear-gradient(135deg,#1a5276,#2c3e50);color:#fff;padding:12px 16px;border-radius:var(--r);margin-bottom:10px}
.hdr h1{font-size:17px;font-weight:700}
.hdr .stats{font-size:11px;opacity:.85;margin-top:2px}
.srch{width:100%;padding:8px 12px;border:none;border-radius:8px;font-size:13px;margin-top:6px;outline:none;background:rgba(255,255,255,.15);color:#fff}
.srch::placeholder{color:rgba(255,255,255,.5)}
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fafafa;transition:all .1s}
.tab:active{transform:scale(.96)}.tab.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
.adv-srch{display:none;background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.adv-srch.show{display:block}
.adv-srch .frow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:6px 0}
.adv-srch .flbl{font-size:11px;font-weight:600;min-width:50px;color:var(--text)}
.adv-srch select,.adv-srch input[type=number],.adv-srch input[type=date]{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.adv-srch select{min-width:100px}.adv-srch input[type=number]{width:70px}.adv-srch input[type=date]{width:130px}
.result-count{font-size:12px;font-weight:700;color:var(--acc);padding:6px 12px;background:#e8f0fe;border-radius:8px;display:inline-block}
.preset-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.preset{font-size:10px;padding:4px 10px;border:1px solid var(--acc);color:var(--acc);border-radius:12px;cursor:pointer;background:#fff;white-space:nowrap}
.preset:active{background:#e8f0fe}
.sort-bar{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.sort-btn{padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;border:1.5px solid var(--border);background:#fafafa;white-space:nowrap}
.sort-btn:active{transform:scale(.96)}.sort-btn.sel{border-color:var(--acc);background:#e8f0fe;color:var(--acc);font-weight:600}
.dash{display:none;background:var(--card);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.dash.show{display:block}
.plist{display:flex;flex-direction:column;gap:6px}
.pcard{background:var(--card);border-radius:var(--r);padding:8px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pcard .pinfo{flex:1;min-width:0;cursor:pointer}.pcard .pinfo:active{opacity:.7}
.pcard .pid{font-size:9px;color:var(--s2)}.pcard .pname{font-size:14px;font-weight:600}
.pcard .pcn{font-size:10px;color:var(--acc);font-weight:600;margin-top:1px}
.pcard .pcontact{font-size:9px;color:var(--s2);margin-top:1px}
.tpdots{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.tpdot{flex:1;min-width:36px;padding:4px 2px;border-radius:5px;text-align:center;font-size:9px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fafafa;transition:all .1s;line-height:1.2}
.tpdot:active{transform:scale(.95)}.tpdot.done{background:#e8f8e8;border-color:var(--ok);color:var(--ok)}
.tpdot .tp-label{display:block;font-size:7px;font-weight:400;color:var(--s2)}.tpdot.done .tp-label{color:var(--ok)}
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s}
.modal.show{pointer-events:auto;opacity:1}.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.sheet{position:relative;width:100%;max-width:650px;max-height:92vh;background:#fff;border-radius:20px 20px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);padding:0 14px 20px}
.modal.show .sheet{transform:translateY(0)}.sheet-handle{width:36px;height:4px;background:#d1d1d6;border-radius:2px;margin:8px auto}
.fhdr{padding:8px 0;border-bottom:1px solid #eee;margin-bottom:4px;position:sticky;top:0;background:#fff;z-index:5}
.fhdr .fname{font-size:17px;font-weight:700}.fhdr .fmeta{font-size:10px;color:var(--s2)}
.fhdr .fcontact{font-size:10px;color:var(--acc)}.fhdr .fcn{font-size:11px;color:var(--acc);font-weight:700}
.ftime-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}
.ftime-badge.t1{background:#f3e5f5;color:#7b1fa2}.ftime-badge.t3{background:#e8f0fe;color:#1a73e8}
.ftime-badge.t6{background:#e8f8e8;color:#0d8a3e}.ftime-badge.t12{background:#fff3e0;color:#e67e22}
.ftime-badge.t60{background:#ffe0e0;color:#c0392b}.ftime-badge.t120{background:#ffcccc;color:#8b0000}
.sec{margin:8px 0}
.sec-title{font-size:12px;font-weight:700;color:#2c3e50;border-bottom:2px solid #2c3e50;padding-bottom:2px;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sec-title .snum{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;background:#2c3e50;color:#fff;border-radius:50%;font-size:10px;flex-shrink:0}
.help{font-size:9px;color:var(--s2);background:#f8f9fa;padding:3px 8px;border-radius:6px;margin-bottom:4px;line-height:1.5;border-left:3px solid var(--acc)}
.help strong{color:var(--text)}.help.warn{background:#fff8e8;border-left-color:var(--warn)}
.qrow{display:flex;align-items:center;gap:4px;padding:3px 0;flex-wrap:wrap}
.qrow .qlabel{font-size:11px;font-weight:500;min-width:70px}.qrow .qdesc{font-size:9px;color:var(--s2);margin-left:2px}
.chip-group{display:flex;gap:3px;flex-wrap:wrap}
.chip{padding:5px 10px;border:1.5px solid var(--border);border-radius:14px;font-size:11px;cursor:pointer;transition:all .1s;background:#fafafa;white-space:nowrap}
.chip:active{transform:scale(.95)}.chip.sel{border-color:var(--acc);background:#e8f0fe;color:var(--acc);font-weight:600}
.chip.sel-red{border-color:var(--red);background:#ffe8e8;color:var(--red);font-weight:600}
.chip.sel-ok{border-color:var(--ok);background:#e8f8e8;color:var(--ok);font-weight:600}
.slider-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.slider-row .sval{font-size:14px;font-weight:700;min-width:28px;text-align:center;color:var(--acc)}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:#dde;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--acc);border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
select.date-sel{padding:4px 6px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-family:inherit;outline:none;background:#fff}
.today-btn{font-size:10px;padding:4px 10px;border:1px solid var(--acc);color:var(--acc);border-radius:12px;cursor:pointer;background:#fff;margin-left:4px}
.today-btn:active{background:#e8f0fe}
.auto-score{font-size:14px;font-weight:700;color:var(--acc);min-width:44px;text-align:center;padding:3px 6px;background:#f0f7ff;border-radius:6px}
.auto-score.excellent{color:#0d8a3e;background:#e8f8e8}.auto-score.good{color:#1a73e8;background:#e8f0fe}
.auto-score.fair{color:#e67e22;background:#fff3e0}.auto-score.poor{color:#c0392b;background:#ffe8e8}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;text-align:center}
.btn:active{transform:scale(.96)}.btn-pri{background:var(--acc);color:#fff;width:100%;padding:10px;font-size:14px;border-radius:10px;margin-top:6px}
.btn-sec{background:#f0f0f0;color:var(--text);width:100%;margin-top:4px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.info-btn{display:inline-flex;width:16px;height:16px;align-items:center;justify-content:center;background:var(--acc);color:#fff;border-radius:50%;font-size:10px;cursor:pointer;font-weight:700;flex-shrink:0}
.info-popup{display:none;background:#f0f7ff;border:1px solid var(--acc);border-radius:8px;padding:6px 8px;margin:3px 0;font-size:9px;line-height:1.5;color:var(--text)}
.info-popup.show{display:block}.info-popup table{width:100%;border-collapse:collapse;margin-top:3px}
.info-popup td,.info-popup th{padding:2px 4px;border:1px solid #dde;font-size:8px;text-align:center}
.info-popup th{background:#e8f0fe;font-weight:600}
.grade-legend{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.grade-legend span{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:600}
.gl-excellent{background:#e8f8e8;color:#0d8a3e}.gl-good{background:#e8f0fe;color:#1a73e8}
.gl-fair{background:#fff3e0;color:#e67e22}.gl-poor{background:#ffe8e8;color:#c0392b}.ptag{display:inline-block;padding:2px 6px;background:#f0f0f0;border-radius:4px;font-size:9px;margin:1px}.ptag.filled{background:#e8f0fe;color:var(--acc);font-weight:600}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr"><h1>🦾 肩袖术后随访系统</h1><div class="stats"><span id="tc">0</span>例 | 已随访<span id="dtp">0</span>人次 | 全部完成<span id="dpt">0</span>人</div><button class="btn" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);padding:4px 12px;font-size:11px;margin-top:6px;border-radius:8px" onclick="showAddPatient()">➕ 添加患者</button></div>
  <input class="srch" id="search" placeholder="🔍 快速搜索姓名/住院号..." oninput="doFilter()">
  <div class="tabs">
    <span class="tab sel" id="tabList" onclick="showTab('list')">📋 患者列表</span>
    <span class="tab" id="tabDash" onclick="showTab('dash')">📊 统筹表</span>
    <span class="tab" id="tabAdv" onclick="toggleAdvSearch()">🔍 高级搜索</span>
  </div>
  <div class="adv-srch" id="advSearch">
    <div style="font-weight:700;font-size:13px;margin-bottom:8px">🔍 高级搜索 <span id="advCount" class="result-count"></span></div>
    <div class="frow"><span class="flbl">性别</span><select id="as_g" onchange="doFilter()"><option value="">全部</option><option value="男">男</option><option value="女">女</option></select><span class="flbl" style="margin-left:12px">年龄</span><input type="number" id="as_a1" placeholder="最小" onchange="doFilter()"> - <input type="number" id="as_a2" placeholder="最大" onchange="doFilter()"></div>
    <div class="frow"><span class="flbl">糖尿病</span><select id="as_dm" onchange="doFilter()"><option value="">全部</option><option value="1">有</option><option value="0">无</option></select><span class="flbl" style="margin-left:12px">高血压</span><select id="as_ht" onchange="doFilter()"><option value="">全部</option><option value="1">有</option><option value="0">无</option></select></div>
    <div class="frow"><span class="flbl">手术日期</span><input type="date" id="as_s1" onchange="doFilter()"> - <input type="date" id="as_s2" onchange="doFilter()"></div>
    <div class="frow"><span class="flbl">随访状态</span><select id="as_fu" onchange="doFilter()"><option value="">全部</option><option value="started">至少完成1个</option><option value="all">全部完成(6个)</option><option value="none">尚未开始</option></select><span class="flbl" style="margin-left:12px">再撕裂</span><select id="as_rt" onchange="doFilter()"><option value="">全部</option><option value="1">有再撕裂</option><option value="0">无再撕裂</option></select></div>
    <div class="frow"><span class="flbl">ASES评分</span><select id="as_ases" onchange="doFilter()"><option value="">全部</option><option value="poor">&lt;70(差)</option><option value="fair">70-79(可)</option><option value="good">80-89(良)</option><option value="excellent">≥90(优)</option></select><span class="flbl" style="margin-left:12px">满意度</span><select id="as_satis" onchange="doFilter()"><option value="">全部</option><option value="low">≤4(不满意)</option><option value="mid">6-8(一般)</option><option value="high">10(非常满意)</option></select></div>
    <div class="frow"><span class="flbl">关键词</span><input type="text" id="as_kw" placeholder="诊断/术式关键词..." oninput="doFilter()" style="flex:1;max-width:300px"></div>
    <div class="preset-row"><span style="font-size:10px;color:#999;margin-right:4px">快速筛选:</span><span class="preset" onclick="preset('age60')">年龄≥60</span><span class="preset" onclick="preset('age70')">年龄≥70</span><span class="preset" onclick="preset('dm')">糖尿病</span><span class="preset" onclick="preset('ht')">高血压</span><span class="preset" onclick="preset('dm_ht')">糖+压</span><span class="preset" onclick="preset('retear')">有再撕裂</span><span class="preset" onclick="preset('poor_ases')">ASES&lt;70</span><span class="preset" onclick="preset('fu_none')">尚未随访</span><span class="preset" onclick="preset('fu_done')">全部完成</span><span class="preset" onclick="preset('clear')">清除全部</span></div>
  </div>
  <div class="sort-bar">
    <span style="font-size:10px;color:#999">排序:</span>
    <span class="sort-btn sel" id="sb_date" onclick="setSort('date')">手术日期</span><span class="sort-btn" id="sb_age" onclick="setSort('age')">年龄</span><span class="sort-btn" id="sb_pain" onclick="setSort('pain')">VAS疼痛</span><span class="sort-btn" id="sb_ases" onclick="setSort('ases')">ASES评分</span><span class="sort-btn" id="sb_satis" onclick="setSort('satis')">满意度</span><span class="sort-btn" id="sb_retear" onclick="setSort('retear')">再撕裂</span>
    <select id="filterTP" onchange="setFilterTP(this.value)" style="padding:3px 8px;border:1.5px solid var(--border);border-radius:12px;font-size:10px;background:#fafafa;font-family:inherit"><option value="">📅 术后时间段(全部)</option><option value="m1">≤1月</option><option value="m3">1-3月</option><option value="m6">3-6月</option><option value="y1">6-12月</option><option value="y5">1-5年</option><option value="y10">5-10年+</option></select>
  </div>
  <div class="dash" id="dashPanel"></div>
  <div class="plist" id="pl"></div>
  <div style="margin-top:8px"><button class="btn btn-sec" onclick="exportCSV()" style="font-size:11px">📥 导出CSV</button></div>
</div>
<div class="modal" id="md"><div class="backdrop" id="bd"></div><div class="sheet" id="sh"><div class="sheet-handle"></div><div id="fc"></div></div></div>
<div class="toast" id="to"></div>

    var W={m1:[0,1],m3:[1,3],m6:[3,6],y1:[6,12],y5:[12,60],y10:[60,1200]};
